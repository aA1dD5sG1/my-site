<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security Scanner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 400px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            color: #94a3b8;
        }

        .btn {
            display: block;
            margin: 10px 0;
            padding: 12px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡 Security Scanner</h1>
    <p>Ethical Web Testing Tool</p>

    <a href="/login" class="btn">🔐 Login</a>
    <a href="/dashboard" class="btn">📊 Dashboard</a>
    <a href="/scan" class="btn">🔍 Start Scan</a>
</div>

</body>
</html>
