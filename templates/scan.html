<!DOCTYPE html>
<html>
<body>

<h2>Scan Website</h2>

<form method="POST">
  <input name="url" placeholder="http://example.com">
  <button onclick="this.innerText='Scanning...'">Scan</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

{% if results %}
<h3>Results for {{target}}</h3>
<ul>
  {% for r in results %}
    <li>{{ r }}</li>
  {% endfor %}
</ul>
{% endif %}

<a href="/dashboard">Back</a>

</body>
</html>
