<h1>Scan Website</h1>

<form method="POST">
    <input type="text" name="url" placeholder="http://example.com" required>
    <button type="submit">Scan</button>
</form>

{% if results %}
    <h2>Results for {{ target }}</h2>
    <ul>
        {% for r in results %}
            <li>{{ r }}</li>
        {% endfor %}
    </ul>
{% endif %}

<a href="/dashboard">Back to Dashboard</a>
