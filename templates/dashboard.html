<h1>📊 Dashboard</h1>

<p>Total Scans: {{ scans }}</p>

<h3>Scan History:</h3>
<ul>
    {% for item in history %}
        <li>
            {{ item.url }} -
            {% if item.status == "danger" %}
                🔴 Dangerous
            {% elif item.status == "warning" %}
                🟡 Warning
            {% else %}
                🟢 Safe
            {% endif %}
        </li>
    {% endfor %}
</ul>

<a href="/scan">Start New Scan</a>
